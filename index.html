<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Lumen RPG — turn your real tasks into XP, levels, and streaks." />
  <title>Lumina</title>

  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="icons/favicon-16.png" sizes="16x16" type="image/png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4065dd" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Lumen RPG" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />

  <!-- Classic (non-module) build, not the "+esm" CDN build — jsDelivr's ESM
       rewrite of supabase-js currently has an open bug that breaks auth in
       the browser (github.com/orgs/supabase/discussions/41118). This script
       tag sets a plain window.supabase.createClient global instead, which
       js/database/supabase-client.js reads from. Runs before our module
       script below, so it's guaranteed to be ready in time. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <canvas id="glow-canvas" aria-hidden="true"></canvas>
  <div id="app"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
